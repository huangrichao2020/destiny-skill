<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四乡诊断报告</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=ZCOOL+XiaoWei&display=swap');

  :root {
    --bg-deep: #0a0a0f;
    --bg-card: #12121a;
    --gold: #c9a84c;
    --gold-dim: #8a7232;
    --gold-glow: #e8c55a;
    --ink: #d4cfc4;
    --ink-dim: #7a756c;
    --red-seal: #8b2e2e;
    --red-light: #a05050;
    --border: #2a2822;
    --green: #5a8a5a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    color: var(--ink);
    font-family: 'Noto Serif SC', 'Songti SC', serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 20% 15%, rgba(201,168,76,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 500px 500px at 80% 85%, rgba(139,46,46,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* Header */
  .header { text-align: center; margin-bottom: 48px; }
  .header::before, .header::after {
    content: ''; display: block; width: 120px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    margin: 0 auto;
  }
  .header::before { margin-bottom: 24px; }
  .header::after { margin-top: 24px; }
  .header-sub { font-size: 12px; letter-spacing: 6px; color: var(--gold-dim); margin-bottom: 10px; }
  .header-title {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 32px; color: var(--gold); letter-spacing: 4px;
    text-shadow: 0 0 40px rgba(201,168,76,0.12);
  }
  .header-scene {
    margin-top: 16px; font-size: 14px; color: var(--ink-dim);
    line-height: 1.8; max-width: 560px; margin-left: auto; margin-right: auto;
  }

  /* SVG Diagram */
  .diagram-section { margin-bottom: 44px; text-align: center; }
  .diagram-section svg { max-width: 100%; height: auto; }

  /* Diagnosis Cards */
  .diag-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 36px;
  }

  .diag-card {
    border: 1px solid var(--border);
    background: var(--bg-card);
    padding: 20px;
  }

  .diag-card.full-width { grid-column: 1 / -1; }

  .diag-label {
    font-size: 11px; letter-spacing: 3px; margin-bottom: 8px;
    font-weight: 600;
  }
  .diag-label.gold { color: var(--gold-dim); }
  .diag-label.red { color: var(--red-light); }
  .diag-label.green { color: var(--green); }

  .diag-village {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 18px; color: var(--gold); margin-bottom: 6px;
  }

  .diag-detail {
    font-size: 14px; line-height: 1.9; color: var(--ink-dim);
  }

  /* Score Bars */
  .scores-section { margin-bottom: 40px; }
  .scores-title {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 16px; color: var(--gold-dim);
    letter-spacing: 3px; margin-bottom: 20px; text-align: center;
  }

  .score-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
  }

  .score-name {
    width: 70px; font-size: 13px; color: var(--ink-dim);
    text-align: right; flex-shrink: 0;
  }

  .score-bars {
    flex: 1; display: flex; flex-direction: column; gap: 4px;
  }

  .score-bar-wrap {
    display: flex; align-items: center; gap: 8px;
  }

  .score-bar-label {
    width: 28px; font-size: 10px; color: var(--ink-dim); flex-shrink: 0;
  }

  .score-bar-bg {
    flex: 1; height: 6px; background: rgba(42,40,34,0.8);
    border-radius: 3px; overflow: hidden; position: relative;
  }

  .score-bar-fill {
    height: 100%; border-radius: 3px;
    transition: width 1s ease;
  }

  .score-bar-fill.self { background: var(--gold-dim); }
  .score-bar-fill.other { background: var(--red-seal); }

  .score-val {
    width: 28px; font-size: 11px; color: var(--ink-dim); flex-shrink: 0;
  }

  /* Advice Section */
  .advice-section {
    border: 1px solid var(--gold-dim);
    background: linear-gradient(180deg, rgba(201,168,76,0.04), transparent);
    padding: 28px;
    margin-bottom: 40px;
    position: relative;
  }
  .advice-section::before {
    content: '修行建议'; position: absolute; top: -12px; left: 50%;
    transform: translateX(-50%); background: var(--bg-deep);
    padding: 0 16px; font-size: 12px; color: var(--gold); letter-spacing: 4px;
  }

  .advice-focus {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 20px; color: var(--gold); text-align: center;
    margin-bottom: 12px;
  }

  .advice-layer {
    text-align: center; font-size: 13px; color: var(--gold-dim);
    letter-spacing: 2px; margin-bottom: 16px;
  }

  .advice-practice {
    font-size: 14.5px; line-height: 2; color: var(--ink);
    text-align: center;
  }

  /* Closing */
  .closing {
    text-align: center; padding: 32px 24px;
    border: 1px solid var(--border);
    background: linear-gradient(180deg, transparent, rgba(201,168,76,0.03));
  }
  .closing-verse {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 17px; line-height: 2.4; color: var(--gold); letter-spacing: 2px;
  }
  .closing-verse .dim {
    color: var(--ink-dim); font-family: 'Noto Serif SC', serif;
    font-size: 13px; letter-spacing: 1px;
  }

  .footer-mark {
    text-align: center; margin-top: 40px;
    font-size: 11px; color: var(--ink-dim); letter-spacing: 6px; opacity: 0.5;
  }

  /* Zhu Xiang Cards */
  .zhuxiang-section { margin-bottom: 36px; }
  .zhuxiang-title {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 16px; color: var(--gold-dim);
    letter-spacing: 3px; margin-bottom: 16px; text-align: center;
  }

  .zx-card {
    border: 1px solid var(--border);
    background: var(--bg-card);
    padding: 16px 20px;
    margin-bottom: 10px;
  }

  .zx-card-label {
    font-size: 10px; letter-spacing: 2px;
    font-weight: 600; margin-bottom: 6px;
  }

  .zx-card-label.gold { color: var(--gold-dim); }
  .zx-card-label.red { color: var(--red-light); }

  .zx-card h4 {
    font-size: 14px; color: var(--gold);
    margin-bottom: 4px; letter-spacing: 1px;
  }

  .zx-card p {
    font-size: 13px; line-height: 1.8;
    color: var(--ink-dim);
  }

  .zx-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .zx-loop-flow {
    display: flex; align-items: center; flex-wrap: wrap;
    gap: 4px; margin: 8px 0; font-size: 12px;
  }

  .zx-loop-flow .zx-n {
    background: rgba(10,10,15,0.6);
    border: 1px solid var(--border);
    padding: 3px 8px; color: var(--gold);
  }

  .zx-loop-flow .zx-n.active {
    border-color: #a05050;
    color: #a05050;
    background: rgba(139,46,46,0.1);
  }

  .zx-loop-flow .zx-a {
    color: var(--gold-dim);
  }

  /* Logic Comparison */
  .logic-section { margin-bottom: 36px; }
  .logic-title {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 16px; color: var(--gold-dim);
    letter-spacing: 3px; margin-bottom: 16px; text-align: center;
  }
  .logic-pair {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .logic-box {
    border: 1px solid var(--border); background: var(--bg-card);
    padding: 16px 18px;
  }
  .logic-box .lb-tag {
    font-size: 10px; letter-spacing: 2px; font-weight: 600;
    margin-bottom: 6px;
  }
  .logic-box .lb-tag.formal { color: #7a6550; }
  .logic-box .lb-tag.dialectical { color: var(--gold); }
  .logic-box h4 {
    font-size: 13px; color: var(--ink); margin-bottom: 6px;
    font-weight: 600;
  }
  .logic-box p {
    font-size: 12px; line-height: 1.7; color: var(--ink-dim);
  }
  .logic-shift {
    border: 1px solid var(--border); background: rgba(201,168,76,0.03);
    padding: 14px 18px; margin-top: 10px; text-align: center;
  }
  .logic-shift .ls-label {
    font-size: 10px; letter-spacing: 2px; color: var(--gold-dim);
    font-weight: 600; margin-bottom: 6px;
  }
  .logic-shift p {
    font-size: 13px; line-height: 1.8; color: var(--gold);
  }

  @media (max-width: 600px) {
    .zx-pair { grid-template-columns: 1fr; }
    .logic-pair { grid-template-columns: 1fr; }
  }

  @media (max-width: 600px) {
    .container { padding: 32px 16px 60px; }
    .header-title { font-size: 26px; }
    .diag-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
const D = window.__VILLAGES_DATA__ || {
  title: "四乡诊断报告",
  subtitle: "示例场景",
  diagnosis: {
    summary: "当前格局：叙事乡定力不足，被付出故事绑架",
    bright: { village: "自大乡", detail: "你在用力看见对方，但用力过猛反而压抑了自己" },
    dark: { village: "叙事乡", detail: "完全忽略了叙事的力量，没有意识到自己在写一个委屈的故事" },
    blockage: { village: "叙事乡", layer: "定力", detail: "把付出当交换，主角变成了别人的反应而不是自己的选择" },
    generation_break: { from: "光环乡", to: "叙事乡", detail: "你在他面前不够真实，他写不出深的故事" },
    restraint_active: { from: "自大乡", to: "叙事乡", detail: "\"我应该被看到\"的我执，正在克掉你叙事的自主性" },
    zhuxiang: {
      surface: "我是对的",
      deep: "我害怕承认错了意味着我不够好",
      grid_position: "自我 × 价值感",
      loop_stage: "情绪",
      loop_desc: "住相被威胁时启动防御反应，开始否定一切与自己判断矛盾的信息",
      drive: "驱动你去证明自己",
      distort: "扭曲了你对不同意见的感知——把所有不同意都解读为对你的否定",
      protect: "保护着深层对自我价值的恐惧",
      perception_level: "L2",
      perception_note: "能觉察情绪但还被情绪带走，尚未看破住相本身",
      logic: {
        current: "形式逻辑",
        formal_think: "\"我对，你错\"——二元判断，别人的不同意见等于对我的否定",
        formal_fixation: "我必须是对的",
        dialectical_think: "\"我可以同时对和错\"——取决于参照系，他的视角和我的在不同框架下都成立",
        dialectical_practice: "不需要忍住，因为同时看到了多个面",
        shift_hint: "当你急着反驳的那一刻，停下来问：如果他是完全对的，那会怎样？"
      }
    }
  },
  scores: {
    "自大乡": { self: 65, other: 40 },
    "幻想乡": { self: 50, other: 55 },
    "光环乡": { self: 35, other: 50 },
    "叙事乡": { self: 25, other: 35 }
  },
  advice: {
    focus: "叙事乡",
    layer: "修己 · 定力",
    practice: "重写你的故事：把\"因为他……所以我……\"改成\"我选择……因为我看重……\"。每次付出后问自己——如果这件事没有回报，我还愿意做吗？"
  }
};

const villageMap = { "自大乡":"大", "幻想乡":"幻", "光环乡":"光", "叙事乡":"叙" };
const positions = {
  "自大乡": { cx: 200, cy: 40 },
  "幻想乡": { cx: 340, cy: 180 },
  "光环乡": { cx: 200, cy: 320 },
  "叙事乡": { cx: 60, cy: 180 }
};

function buildDiagram() {
  const highlights = {};
  if (D.diagnosis.bright) highlights[D.diagnosis.bright.village] = "bright";
  if (D.diagnosis.dark) highlights[D.diagnosis.dark.village] = "dark";
  if (D.diagnosis.blockage) highlights[D.diagnosis.blockage.village] = "block";

  const colorFor = v => {
    const h = highlights[v];
    if (h === "bright") return "#c9a84c";
    if (h === "dark") return "#4a4540";
    if (h === "block") return "#8b2e2e";
    return "#c9a84c";
  };

  const opFor = v => {
    const h = highlights[v];
    if (h === "dark") return "0.5";
    return "1";
  };

  let nodes = "";
  for (const [name, pos] of Object.entries(positions)) {
    const c = colorFor(name);
    const op = opFor(name);
    const sw = highlights[name] === "bright" ? 2.5 : 1.5;
    nodes += `
      <circle cx="${pos.cx}" cy="${pos.cy}" r="30" fill="#12121a"
        stroke="${c}" stroke-width="${sw}" opacity="${op}"/>
      <text x="${pos.cx}" y="${pos.cy - 4}" text-anchor="middle"
        font-family="'ZCOOL XiaoWei', serif" font-size="18"
        fill="${c}" opacity="${op}">${villageMap[name]}</text>
      <text x="${pos.cx}" y="${pos.cy + 14}" text-anchor="middle"
        font-family="'Noto Serif SC', serif" font-size="9"
        fill="#7a756c" opacity="${op}">${name}</text>`;
  }

  return `<svg viewBox="0 0 400 360" width="380" height="342" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="ag" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
        <path d="M0,0 L7,2.5 L0,5" fill="#c9a84c" opacity="0.6"/>
      </marker>
      <marker id="ar" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
        <path d="M0,0 L7,2.5 L0,5" fill="#8b2e2e" opacity="0.5"/>
      </marker>
    </defs>
    <line x1="200" y1="62" x2="200" y2="288" stroke="#8a7232" stroke-width="1" stroke-dasharray="5,5" opacity="0.25"/>
    <line x1="72" y1="180" x2="328" y2="180" stroke="#8a7232" stroke-width="1" stroke-dasharray="5,5" opacity="0.25"/>
    <path d="M 228,52 Q 310,70 332,152" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.35" marker-end="url(#ag)"/>
    <path d="M 332,208 Q 310,290 228,308" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.35" marker-end="url(#ag)"/>
    <path d="M 172,308 Q 90,290 68,208" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.35" marker-end="url(#ag)"/>
    <path d="M 68,152 Q 90,70 172,52" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.35" marker-end="url(#ag)"/>
    <line x1="180" y1="52" x2="82" y2="162" stroke="#8b2e2e" stroke-width="1" stroke-dasharray="3,4" opacity="0.25" marker-end="url(#ar)"/>
    <line x1="322" y1="208" x2="222" y2="298" stroke="#8b2e2e" stroke-width="1" stroke-dasharray="3,4" opacity="0.25" marker-end="url(#ar)"/>
    ${nodes}
  </svg>`;
}

function buildScores() {
  let html = "";
  for (const [name, s] of Object.entries(D.scores)) {
    html += `<div class="score-row">
      <div class="score-name">${name}</div>
      <div class="score-bars">
        <div class="score-bar-wrap">
          <div class="score-bar-label">定力</div>
          <div class="score-bar-bg"><div class="score-bar-fill self" style="width:${s.self}%"></div></div>
          <div class="score-val">${s.self}</div>
        </div>
        <div class="score-bar-wrap">
          <div class="score-bar-label">法力</div>
          <div class="score-bar-bg"><div class="score-bar-fill other" style="width:${s.other}%"></div></div>
          <div class="score-val">${s.other}</div>
        </div>
      </div>
    </div>`;
  }
  return html;
}

function render() {
  const diag = D.diagnosis;
  document.getElementById("app").innerHTML = `
    <div class="header">
      <div class="header-sub">四乡法门 · 诊断报告</div>
      <div class="header-title">${D.title}</div>
      ${D.subtitle ? `<div class="header-scene">${D.subtitle}</div>` : ''}
    </div>

    <div class="diagram-section">${buildDiagram()}</div>

    <div class="diag-grid">
      <div class="diag-card">
        <div class="diag-label gold">当前格局</div>
        <div class="diag-detail">${diag.summary}</div>
      </div>
      <div class="diag-card">
        <div class="diag-label gold">最亮的乡</div>
        <div class="diag-village">${diag.bright.village}</div>
        <div class="diag-detail">${diag.bright.detail}</div>
      </div>
      <div class="diag-card">
        <div class="diag-label red">最暗的乡</div>
        <div class="diag-village">${diag.dark.village}</div>
        <div class="diag-detail">${diag.dark.detail}</div>
      </div>
      <div class="diag-card">
        <div class="diag-label red">卡点诊断</div>
        <div class="diag-village">${diag.blockage.village} · ${diag.blockage.layer}</div>
        <div class="diag-detail">${diag.blockage.detail}</div>
      </div>
      <div class="diag-card">
        <div class="diag-label gold">相生断裂</div>
        <div class="diag-village">${diag.generation_break.from} → ${diag.generation_break.to}</div>
        <div class="diag-detail">${diag.generation_break.detail}</div>
      </div>
      <div class="diag-card">
        <div class="diag-label red">暗克警示</div>
        <div class="diag-village">${diag.restraint_active.from} -×→ ${diag.restraint_active.to}</div>
        <div class="diag-detail">${diag.restraint_active.detail}</div>
      </div>
    </div>

    <div class="zhuxiang-section">
      <div class="zhuxiang-title">住相诊断</div>
      <div class="zx-pair">
        <div class="zx-card">
          <div class="zx-card-label gold">表层住相</div>
          <h4>${diag.zhuxiang.surface}</h4>
          <p>自己意识到的信念，可以说出口的</p>
        </div>
        <div class="zx-card">
          <div class="zx-card-label red">深层住相</div>
          <h4>${diag.zhuxiang.deep}</h4>
          <p>不自知的驱动力，修到这一层才是治本</p>
        </div>
      </div>
      <div class="zx-card">
        <div class="zx-card-label gold">九宫格定位</div>
        <h4>${diag.zhuxiang.grid_position}</h4>
      </div>
      <div class="zx-card">
        <div class="zx-card-label red">闭环状态</div>
        <div class="zx-loop-flow">
          <span class="zx-n${diag.zhuxiang.loop_stage==='住相'?' active':''}">住相</span>
          <span class="zx-a">→</span>
          <span class="zx-n${diag.zhuxiang.loop_stage==='排异'?' active':''}">排异</span>
          <span class="zx-a">→</span>
          <span class="zx-n${diag.zhuxiang.loop_stage==='抬杠'?' active':''}">抬杠</span>
          <span class="zx-a">→</span>
          <span class="zx-n${diag.zhuxiang.loop_stage==='情绪'?' active':''}">情绪</span>
          <span class="zx-a">→</span>
          <span class="zx-n${diag.zhuxiang.loop_stage==='偏见'?' active':''}">偏见</span>
          <span class="zx-a">→</span>
          <span class="zx-n">更深</span>
        </div>
        <p>${diag.zhuxiang.loop_desc}</p>
      </div>
      <div class="zx-card">
        <div class="zx-card-label gold">执念流向</div>
        <p><strong style="color:var(--gold)">驱动：</strong>${diag.zhuxiang.drive}</p>
        <p><strong style="color:#a05050">扭曲：</strong>${diag.zhuxiang.distort}</p>
        <p><strong style="color:var(--ink-dim)">保护：</strong>${diag.zhuxiang.protect}</p>
      </div>
      <div class="zx-card">
        <div class="zx-card-label gold">修行层级</div>
        <h4>${diag.zhuxiang.perception_level}</h4>
        <p>${diag.zhuxiang.perception_note}</p>
      </div>
    </div>

    ${diag.zhuxiang.logic ? `
    <div class="logic-section">
      <div class="logic-title">思维层次 · 形式 vs 辩证</div>
      <div class="logic-pair">
        <div class="logic-box">
          <div class="lb-tag formal">形式逻辑 · 你当前在这里</div>
          <h4>${diag.zhuxiang.logic.formal_think}</h4>
          <p>住相：${diag.zhuxiang.logic.formal_fixation}</p>
        </div>
        <div class="logic-box">
          <div class="lb-tag dialectical">辩证逻辑 · 高手在这里</div>
          <h4>${diag.zhuxiang.logic.dialectical_think}</h4>
          <p>修法：${diag.zhuxiang.logic.dialectical_practice}</p>
        </div>
      </div>
      <div class="logic-shift">
        <div class="ls-label">转折提示</div>
        <p>${diag.zhuxiang.logic.shift_hint}</p>
      </div>
    </div>
    ` : ''}

    <div class="scores-section">
      <div class="scores-title">四乡定力 · 法力评分</div>
      ${buildScores()}
    </div>

    <div class="advice-section">
      <div class="advice-focus">${D.advice.focus}</div>
      <div class="advice-layer">${D.advice.layer}</div>
      <div class="advice-practice">${D.advice.practice}</div>
    </div>

    <div class="closing">
      <div class="closing-verse">
        不被四乡所转，是定力。<br>
        能转他人四乡，是法力。<br><br>
        <span class="dim">正是修行时，修的就是这两层。</span>
      </div>
    </div>
    <div class="footer-mark">四乡法门 · 诊断报告</div>
  `;
}

render();
</script>
</body>
</html>
